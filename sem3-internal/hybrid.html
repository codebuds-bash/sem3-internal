<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hybrid Calculator — CodeBuds</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
    rel="stylesheet" />

  <style>
    :root {
      --bg: #000000;
      --bg-secondary: #0a0a0a;
      --card-bg: #111111;
      --elevated: #1a1a1a;
      --text: #ffffff;
      --text-secondary: #a0a0a0;
      --text-muted: #666666;
      --border: #222222;
      --border-hover: #333333;
      --radius: 14px;
      --transition: all 0.4s cubic-bezier(0.22, 1, 0.36, 1);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
      -webkit-font-smoothing: antialiased;
    }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 40px 20px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      line-height: 1.6;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.02'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    .container {
      width: 100%;
      max-width: 900px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 40px;
      transition: var(--transition);
    }

    .back-link:hover {
      color: var(--text);
    }

    .back-link i {
      font-size: 0.7rem;
    }

    .header {
      text-align: center;
      margin-bottom: 48px;
    }

    .header h1 {
      font-size: clamp(2rem, 5vw, 2.8rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1.1;
      margin-bottom: 12px;
    }

    .header p {
      font-size: 0.9rem;
      color: var(--text-muted);
    }

    .calculator-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      overflow: hidden;
    }

    .tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
    }

    .tab {
      flex: 1;
      padding: 18px;
      text-align: center;
      color: var(--text-muted);
      font-weight: 600;
      font-size: 0.8rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      transition: var(--transition);
      position: relative;
    }

    .tab:hover {
      color: var(--text-secondary);
    }

    .tab.active {
      color: var(--text);
    }

    .tab.active::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 20%;
      width: 60%;
      height: 1px;
      background: var(--text);
    }

    .tab i {
      margin-right: 8px;
      font-size: 0.75rem;
    }

    .tab-content {
      display: none;
      padding: 40px;
    }

    .tab-content.active {
      display: block;
      animation: fadeIn 0.5s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(8px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .section-title {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--text-muted);
      margin-bottom: 28px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .section-title i {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: var(--elevated);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      color: var(--text-secondary);
    }

    .input-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }

    .input-group label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      font-weight: 500;
      font-size: 0.85rem;
      color: var(--text);
    }

    .max-score {
      font-size: 0.75rem;
      color: var(--text-muted);
      font-weight: 400;
    }

    .input-group input {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 15px;
      font-family: 'Inter', sans-serif;
      transition: var(--transition);
      background: var(--bg);
      color: var(--text);
      outline: none;

    }

    .input-group input::placeholder {
      color: var(--text-muted);
    }

    .input-group input:focus {
      border-color: var(--text-secondary);
      box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.05);
    }

    /* ── Experiments ── */
    .experiments-container {
      background: var(--elevated);
      padding: 24px;
      border-radius: 14px;
      margin-bottom: 40px;
      border: 1px solid var(--border);
    }

    .experiments-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 16px;
    }

    .experiment-input {
      margin-bottom: 8px;
    }

    .experiment-input label {
      font-size: 0.8rem;
      margin-bottom: 8px;
      display: block;
      font-weight: 500;
      color: var(--text-secondary);
    }

    .experiment-input input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      transition: var(--transition);
      background: var(--bg);
      color: var(--text);
      font-weight: 500;
      outline: none;
    }

    .experiment-input input::placeholder {
      color: var(--text-muted);
    }

    .experiment-input input:focus {
      border-color: var(--text-secondary);
      box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.05);
    }

    .button-container {
      text-align: center;
      margin-top: 40px;
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      background: var(--text);
      color: var(--bg);
      border: none;
      padding: 16px 32px;
      font-size: 0.8rem;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border-radius: 10px;
      cursor: pointer;
      transition: var(--transition);
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }

    .btn:hover {
      background: rgba(255, 255, 255, 0.9);
      transform: translateY(-2px);
      box-shadow: 0 4px 20px rgba(255, 255, 255, 0.1);
    }

    .btn:active {
      transform: scale(0.97);
    }

    .btn i {
      font-size: 0.75rem;
    }

    .btn-success {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-success:hover {
      background: var(--elevated);
      border-color: var(--border-hover);
      box-shadow: none;
    }

    .result-container {
      margin-top: 48px;
      padding: 40px;
      background: var(--text);
      border-radius: 16px;
      color: var(--bg);
      text-align: center;
      display: none;
      animation: fadeIn 0.5s ease;
    }

    .result-container.show {
      display: block;
    }

    .result-text {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      margin-bottom: 24px;
    }

    .progress-container {
      margin-top: 32px;
    }

    .progress-bar {
      height: 6px;
      background: rgba(0, 0, 0, 0.1);
      border-radius: 3px;
      overflow: hidden;
      margin-bottom: 12px;
    }

    .progress-fill {
      height: 100%;
      background: var(--bg);
      border-radius: 3px;
      transition: width 1s cubic-bezier(0.22, 1, 0.36, 1);
      width: 0%;
    }

    .progress-text {
      display: flex;
      justify-content: space-between;
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--text-muted);
    }

    .marks-breakdown {
      background: rgba(0, 0, 0, 0.06);
      border-radius: 12px;
      padding: 24px;
      margin-top: 28px;
      text-align: left;
    }

    .breakdown-title {
      font-weight: 700;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 20px;
      text-align: center;
      padding-bottom: 14px;
      border-bottom: 1px solid rgba(0, 0, 0, 0.1);
    }

    .breakdown-item {
      display: flex;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid rgba(0, 0, 0, 0.06);
      font-size: 0.85rem;
    }

    .breakdown-item:last-child {
      border-bottom: none;
      font-weight: 700;
      font-size: 1rem;
      margin-top: 12px;
      padding-top: 16px;
      border-top: 1px solid rgba(0, 0, 0, 0.15);
    }

    @media (max-width: 768px) {
      .input-grid {
        grid-template-columns: 1fr;
      }

      .experiments-grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .tab-content {
        padding: 24px;
      }

      .button-container {
        flex-direction: column;
      }

      .btn {
        width: 100%;
        justify-content: center;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Home</a>

    <div class="header">
      <h1>Hybrid Marks<br>Calculator</h1>
      <p>Calculate your academic performance with precision</p>
    </div>

    <div class="calculator-card">
      <div class="tabs">
        <div class="tab active" data-tab="calculator">
          <i class="fas fa-calculator"></i> Calculator
        </div>
      </div>

      <div class="tab-content active" id="calculator-tab">
        <div class="section-title">
          <i class="fas fa-book"></i>
          <span>Theory Components</span>
        </div>
        <div class="input-grid">
          <div class="input-group">
            <label for="theoryMST12">Theory MST 1 <span class="max-score">(Max: 20)</span></label>
            <input type="number" id="theoryMST12" min="0" max="20" step="0.1" placeholder="Enter marks" />
          </div>
          <div class="input-group">
            <label for="theoryMST22">Theory MST 2 <span class="max-score">(Max: 20)</span></label>
            <input type="number" id="theoryMST22" min="0" max="20" step="0.1" placeholder="Enter marks" />
          </div>
          <div class="input-group">
            <label for="surpriseTest2">Surprise Test <span class="max-score">(Max: 4)</span></label>
            <input type="number" id="surpriseTest2" min="0" max="4" step="0.1" placeholder="Enter marks" />
          </div>
          <div class="input-group">
            <label for="quiz2">Quiz <span class="max-score">(Max: 4)</span></label>
            <input type="number" id="quiz2" min="0" max="4" step="0.1" placeholder="Enter marks" />
          </div>
        </div>

        <div class="section-title">
          <i class="fas fa-flask"></i>
          <span>Practical Components</span>
        </div>
        <div class="input-grid">
          <div class="input-group">
            <label for="attendance2">Attendance <span class="max-score">(Max: 2)</span></label>
            <input type="number" id="attendance2" min="0" max="2" step="0.1" placeholder="Enter marks" />
          </div>
          <div class="input-group">
            <label for="assignment2">Assignment <span class="max-score">(Max: 6)</span></label>
            <input type="number" id="assignment2" min="0" max="6" step="0.1" placeholder="Enter marks" />
          </div>
          <div class="input-group">
            <label for="labMST2">Practical Mid-Term <span class="max-score">(Max: 4)</span></label>
            <input type="number" id="labMST2" min="0" max="4" step="0.1" placeholder="Enter marks" />
          </div>
          <div class="input-group">
            <label for="finalPractical2">Practical End-Term <span class="max-score">(Max: 20)</span></label>
            <input type="number" id="finalPractical2" min="0" max="20" step="0.1" placeholder="Enter marks" />
          </div>
        </div>

        <div class="section-title">
          <i class="fas fa-vial"></i>
          <span>Practical Worksheets (Max: 2 each)</span>
        </div>
        <!-- //TODO Make it responsive for mobile -->
        <div class="experiments-container">
          <div class="experiments-grid">
            <div class="experiment-input"><label for="experiment12">Exp 1</label><input type="number" id="experiment12"
                min="0" max="2" step="0.1" placeholder="0-2" /></div>
            <div class="experiment-input"><label for="experiment22">Exp 2</label><input type="number" id="experiment22"
                min="0" max="2" step="0.1" placeholder="0-2" /></div>
            <div class="experiment-input"><label for="experiment32">Exp 3</label><input type="number" id="experiment32"
                min="0" max="2" step="0.1" placeholder="0-2" /></div>
            <div class="experiment-input"><label for="experiment42">Exp 4</label><input type="number" id="experiment42"
                min="0" max="2" step="0.1" placeholder="0-2" /></div>
            <div class="experiment-input"><label for="experiment52">Exp 5</label><input type="number" id="experiment52"
                min="0" max="2" step="0.1" placeholder="0-2" /></div>
            <div class="experiment-input"><label for="experiment62">Exp 6</label><input type="number" id="experiment62"
                min="0" max="2" step="0.1" placeholder="0-2" /></div>
            <div class="experiment-input"><label for="experiment72">Exp 7</label><input type="number" id="experiment72"
                min="0" max="2" step="0.1" placeholder="0-2" /></div>
            <div class="experiment-input"><label for="experiment82">Exp 8</label><input type="number" id="experiment82"
                min="0" max="2" step="0.1" placeholder="0-2" /></div>
            <div class="experiment-input"><label for="experiment92">Exp 9</label><input type="number" id="experiment92"
                min="0" max="2" step="0.1" placeholder="0-2" /></div>
            <div class="experiment-input"><label for="experiment102">Exp 10</label><input type="number"
                id="experiment102" min="0" max="2" step="0.1" placeholder="0-2" /></div>
          </div>
        </div>

        <div class="button-container">
          <button class="btn" onclick="calculateHybridMarks()">
            <i class="fas fa-calculator"></i> Calculate Marks
          </button>
          <button class="btn btn-success" id="checkAnotherButton2" style="display: none" onclick="resetForm()">
            <i class="fas fa-redo"></i> Calculate Another
          </button>
        </div>

        <div class="result-container" id="resultContainer2">
          <div class="result-text" id="resultText2"></div>
          <div class="progress-container">
            <div class="progress-bar">
              <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="progress-text">
              <span>0%</span>
              <span id="progressPercentage">0%</span>
              <span>100%</span>
            </div>
          </div>
          <div class="marks-breakdown" id="marksBreakdown"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Tab switching
    document.querySelectorAll(".tab").forEach((tab) => {
      tab.addEventListener("click", () => {
        document.querySelectorAll(".tab").forEach((t) => t.classList.remove("active"));
        document.querySelectorAll(".tab-content").forEach((c) => c.classList.remove("active"));
        tab.classList.add("active");
        const tabId = tab.getAttribute("data-tab");
        document.getElementById(`${tabId}-tab`).classList.add("active");
      });
    });

    function calculateHybridMarks() {
      let attendance = parseFloat(document.getElementById("attendance2").value) || 0;
      let quiz = parseFloat(document.getElementById("quiz2").value) || 0;
      let surpriseTest = parseFloat(document.getElementById("surpriseTest2").value) || 0;
      let labMST = parseFloat(document.getElementById("labMST2").value) || 0;
      let assignment = parseFloat(document.getElementById("assignment2").value) || 0;
      let finalPractical = parseFloat(document.getElementById("finalPractical2").value) || 0;
      let theoryMST1 = parseFloat(document.getElementById("theoryMST12").value) || 0;
      let theoryMST2 = parseFloat(document.getElementById("theoryMST22").value) || 0;

      let experimentTotal = 0;
      let experimentValues = [];
      for (let i = 1; i <= 10; i++) {
        let expValue = parseFloat(document.getElementById(`experiment${i}2`).value) || 0;
        experimentTotal += expValue;
        experimentValues.push(expValue);
      }

      let theoryMST1Weighted = theoryMST1 * 0.25;
      let theoryMST2Weighted = theoryMST2 * 0.25;
      let surpriseTestWeighted = surpriseTest * 1.0;
      let quizWeighted = quiz * 1.0;
      let attendanceWeighted = attendance * 1.0;
      let assignmentWeighted = assignment * 1.0;
      let experimentWeighted = experimentTotal * 1.0;
      let labMSTWeighted = labMST * 1.0;
      let finalPracticalWeighted = finalPractical * 1.0;

      let totalMarks = theoryMST1Weighted + theoryMST2Weighted + surpriseTestWeighted +
        quizWeighted + attendanceWeighted + assignmentWeighted +
        experimentWeighted + labMSTWeighted + finalPracticalWeighted;

      let percentage = (totalMarks / 70) * 100;

      document.getElementById("resultText2").innerHTML = `Total Marks: ${totalMarks.toFixed(2)} / 70`;
      document.getElementById("resultContainer2").classList.add("show");
      document.getElementById("checkAnotherButton2").style.display = "inline-flex";

      setTimeout(() => {
        document.getElementById("progressFill").style.width = `${percentage}%`;
        document.getElementById("progressPercentage").textContent = `${percentage.toFixed(1)}%`;
      }, 300);

      let breakdownHTML = `
          <div class="breakdown-title">Marks Breakdown</div>
          <div class="breakdown-item"><span>Theory MST 1 (${theoryMST1}/20):</span><span>${theoryMST1Weighted.toFixed(2)}</span></div>
          <div class="breakdown-item"><span>Theory MST 2 (${theoryMST2}/20):</span><span>${theoryMST2Weighted.toFixed(2)}</span></div>
          <div class="breakdown-item"><span>Surprise Test (${surpriseTest}/4):</span><span>${surpriseTestWeighted.toFixed(2)}</span></div>
          <div class="breakdown-item"><span>Quiz (${quiz}/4):</span><span>${quizWeighted.toFixed(2)}</span></div>
          <div class="breakdown-item"><span>Attendance (${attendance}/2):</span><span>${attendanceWeighted.toFixed(2)}</span></div>
          <div class="breakdown-item"><span>Assignment (${assignment}/6):</span><span>${assignmentWeighted.toFixed(2)}</span></div>
          <div class="breakdown-item"><span>Practical Worksheets (${experimentTotal}/20):</span><span>${experimentWeighted.toFixed(2)}</span></div>
          <div class="breakdown-item"><span>Practical Mid-Term (${labMST}/4):</span><span>${labMSTWeighted.toFixed(2)}</span></div>
          <div class="breakdown-item"><span>Practical End-Term (${finalPractical}/20):</span><span>${finalPracticalWeighted.toFixed(2)}</span></div>
          <div class="breakdown-item"><span>Total:</span><span>${totalMarks.toFixed(2)} / 70</span></div>
        `;

      document.getElementById("marksBreakdown").innerHTML = breakdownHTML;
      document.getElementById("resultContainer2").scrollIntoView({ behavior: "smooth" });
    }

    function resetForm() {
      document.querySelectorAll("input").forEach((input) => { input.value = ""; });
      document.getElementById("resultContainer2").classList.remove("show");
      document.getElementById("checkAnotherButton2").style.display = "none";
      document.getElementById("progressFill").style.width = "0%";
      document.getElementById("progressPercentage").textContent = "0%";
      window.scrollTo({ top: 0, behavior: "smooth" });
    }
  </script>
</body>

</html>
