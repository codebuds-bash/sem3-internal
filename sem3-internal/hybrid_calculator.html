<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hybrid Subject Calculator — CodeBuds</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg: #000000;
        --card-bg: #111111;
        --elevated: #1a1a1a;
        --text: #ffffff;
        --text-secondary: #a0a0a0;
        --text-muted: #666666;
        --border: #222222;
        --border-hover: #333333;
        --transition: all 0.4s cubic-bezier(0.22, 1, 0.36, 1);
      }

      * { margin: 0; padding: 0; box-sizing: border-box; }
      html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; }

      body {
        font-family: 'Inter', -apple-system, sans-serif;
        background: var(--bg); color: var(--text);
        min-height: 100vh; padding: 40px 20px;
        display: flex; justify-content: center; align-items: flex-start;
        line-height: 1.6;
      }

      body::before {
        content: ''; position: fixed; inset: 0;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.02'/%3E%3C/svg%3E");
        pointer-events: none; z-index: 0;
      }

      .container { width: 100%; max-width: 600px; margin: 0 auto; position: relative; z-index: 1; }

      .back-link {
        display: inline-flex; align-items: center; gap: 8px;
        color: var(--text-muted); text-decoration: none;
        font-size: 0.8rem; font-weight: 500; letter-spacing: 0.08em;
        text-transform: uppercase; margin-bottom: 40px; transition: var(--transition);
      }
      .back-link:hover { color: var(--text); }
      .back-link i { font-size: 0.7rem; }

      .header { text-align: center; margin-bottom: 48px; }
      .header h1 {
        font-size: clamp(2rem, 5vw, 2.8rem); font-weight: 800;
        letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 12px;
      }
      .header p { font-size: 0.9rem; color: var(--text-muted); }

      .calculator {
        background: var(--card-bg); border: 1px solid var(--border);
        border-radius: 20px; padding: 40px; overflow: hidden;
      }

      .section-label {
        font-size: 0.7rem; font-weight: 600; text-transform: uppercase;
        letter-spacing: 0.12em; color: var(--text-muted);
        margin-bottom: 20px; margin-top: 24px; padding-bottom: 12px;
        border-bottom: 1px solid var(--border);
      }
      .section-label:first-child { margin-top: 0; }

      .input-group {
        margin-bottom: 16px;
      }

      .input-group label {
        display: block; margin-bottom: 8px;
        font-weight: 500; font-size: 0.85rem; color: var(--text);
      }

      .input-group input {
        width: 100%; padding: 14px 16px;
        border: 1px solid var(--border); border-radius: 10px;
        font-size: 15px; font-family: 'Inter', sans-serif;
        transition: var(--transition); background: var(--bg);
        color: var(--text); outline: none;
      }
      .input-group input::placeholder { color: var(--text-muted); }
      .input-group input:focus {
        border-color: var(--text-secondary);
        box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.05);
      }

      .calculate-btn {
        display: flex; align-items: center; justify-content: center; gap: 10px;
        width: 100%; margin-top: 32px; padding: 16px;
        background: var(--text); color: var(--bg); border: none;
        border-radius: 10px; cursor: pointer;
        font-size: 0.8rem; font-weight: 600; font-family: 'Inter', sans-serif;
        text-transform: uppercase; letter-spacing: 0.08em;
        transition: var(--transition);
      }
      .calculate-btn:hover {
        background: rgba(255,255,255,0.9); transform: translateY(-2px);
        box-shadow: 0 4px 20px rgba(255,255,255,0.1);
      }
      .calculate-btn:active { transform: scale(0.97); }

      .result {
        margin-top: 32px; padding: 32px;
        background: var(--text); color: var(--bg);
        border-radius: 14px; text-align: center;
        font-size: 1.4rem; font-weight: 700;
        letter-spacing: -0.01em;
        display: none;
        animation: fadeIn 0.5s ease;
      }

      .result.show { display: block; }

      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(8px); }
        to { opacity: 1; transform: translateY(0); }
      }

      @media (max-width: 480px) {
        .calculator { padding: 24px; }
      }
    </style>
  </head>

  <body>
    <div class="container">
      <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Home</a>

      <div class="header">
        <h1>Hybrid Subject<br>Calculator</h1>
        <p>Detailed marks calculation for hybrid subjects</p>
      </div>

      <div class="calculator">
        <div class="section-label">Theory Components</div>

        <div class="input-group">
          <label for="surprise_test">Surprise Test <span style="font-size: 0.75rem; color: var(--text-muted);">(out of 12)</span></label>
          <input type="number" id="surprise_test" name="surprise_test" placeholder="Enter marks" required />
        </div>
        <div class="input-group">
          <label for="mst_1_marks">MST 1 Marks <span style="font-size: 0.75rem; color: var(--text-muted);">(out of 20)</span></label>
          <input type="number" id="mst_1_marks" name="mst_1_marks" placeholder="Enter marks" required />
        </div>
        <div class="input-group">
          <label for="mst_2_marks">MST 2 Marks <span style="font-size: 0.75rem; color: var(--text-muted);">(out of 20)</span></label>
          <input type="number" id="mst_2_marks" name="mst_2_marks" placeholder="Enter marks" required />
        </div>
        <div class="input-group">
          <label for="quiz_marks">Quiz Marks <span style="font-size: 0.75rem; color: var(--text-muted);">(out of 4)</span></label>
          <input type="number" id="quiz_marks" name="quiz_marks" placeholder="Enter marks" required />
        </div>

        <div class="section-label">Practical Components</div>

        <div class="input-group">
          <label for="assignment_marks">Assignment Marks <span style="font-size: 0.75rem; color: var(--text-muted);">(out of 10)</span></label>
          <input type="number" id="assignment_marks" name="assignment_marks" placeholder="Enter marks" required />
        </div>
        <div class="input-group">
          <label for="attendance_marks">Attendance Marks <span style="font-size: 0.75rem; color: var(--text-muted);">(out of 2)</span></label>
          <input type="number" id="attendance_marks" name="attendance_marks" placeholder="Enter marks" required />
        </div>
        <div class="input-group">
          <label for="practical_mst_marks">Practical MST <span style="font-size: 0.75rem; color: var(--text-muted);">(out of 10)</span></label>
          <input type="number" id="practical_mst_marks" name="practical_mst_marks" placeholder="Enter marks" required />
        </div>

        <div class="section-label">Assessment & Practicals</div>

        <div class="input-group">
          <label for="worksheets_marks">Worksheets <span style="font-size: 0.75rem; color: var(--text-muted);">(out of 300)</span></label>
          <input type="number" id="worksheets_marks" name="worksheets_marks" placeholder="Enter total marks" required />
        </div>
        <div class="input-group">
          <label for="end_sem_practical">Practical End-Term <span style="font-size: 0.75rem; color: var(--text-muted);">(out of 40)</span></label>
          <input type="number" id="end_sem_practical" name="end_sem_practical" placeholder="Enter marks" required />
        </div>

        <button class="calculate-btn" onclick="calculate()">
          <i class="fas fa-calculator"></i> Calculate
        </button>

        <div class="result" id="result"></div>
      </div>
    </div>

    <script>
      function calculate() {
        var surpriseTest = parseFloat(document.getElementById("surprise_test").value) || 0;
        var practicalMST = parseFloat(document.getElementById("practical_mst_marks").value) || 0;
        var worksheets = parseFloat(document.getElementById("worksheets_marks").value) || 0;
        var endSemPractical = parseFloat(document.getElementById("end_sem_practical").value) || 0;
        var assignment = parseFloat(document.getElementById("assignment_marks").value) || 0;
        var quiz = parseFloat(document.getElementById("quiz_marks").value) || 0;
        var mst1 = parseFloat(document.getElementById("mst_1_marks").value) || 0;
        var mst2 = parseFloat(document.getElementById("mst_2_marks").value) || 0;
        var attendance = parseFloat(document.getElementById("attendance_marks").value) || 0;

        var mstTotal = mst1 + mst2;

        var total = (surpriseTest / 12) * 4 +
                    (practicalMST / 10) * 4 +
                    (worksheets / 300) * 20 +
                    (endSemPractical / 40) * 20 +
                    (assignment / 10) * 6 +
                    (quiz / 4) * 4 +
                    (mstTotal / 40) * 10 +
                    (attendance / 2) * 2;

        var resultEl = document.getElementById("result");
        resultEl.textContent = "Total Marks: " + total.toFixed(2) + " Out of 70";
        resultEl.classList.add("show");
      }
    </script>
  </body>
</html>
